<html>

<head>

<style>

body{
background:#061926;
color:white;
font-family:Arial;
}

.container{
width:900px;
margin:auto;
}

.scroll{
max-height:400px;
overflow-y:scroll;
border:1px solid white;
padding:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Final Score: {{score}} / 25</h1>

<h2>Incorrect Answers</h2>

<div class="scroll">

{% for w in wrong %}

<p><b>Question:</b> {{w.question}}</p>
<p><b>Your answer:</b> {{w.your}}</p>
<p><b>Correct answer:</b> {{w.correct}}</p>
<p><b>Explanation:</b> {{w.explanation}}</p>
<hr>

{% endfor %}

</div>

<h2>Leaderboard</h2>

<ul>

{% for name,score in leaderboard %}

<li>{{name}} — {{score}} / 25</li>

{% endfor %}

</ul>

<form method="POST">

<input name="name" placeholder="Enter your name">

<button>Submit Score</button>

</form>

</div>

</body>

</html>
